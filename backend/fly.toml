# fly.toml app configuration file generated for docchat-backend on 2026-07-01T21:31:23-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'docchat-backend'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'
  UPLOAD_DIR = '/data/uploads'
  VECTOR_STORE_DIR = '/data/vector_stores'

[[mounts]]
  source = 'docchat_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
