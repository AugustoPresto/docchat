# fly.toml app configuration file generated for docchat-frontend on 2026-07-01T22:03:50-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'docchat-frontend'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  BACKEND_URL = 'http://docchat-backend.internal:8000/api/'
  PUBLIC_BACKEND_URL = 'https://docchat-backend.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
