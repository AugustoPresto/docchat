server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    # Fly.io internal DNS resolver (IPv6). Required to lazily resolve
    # .internal hostnames at request time instead of at nginx startup.
    resolver [fdaa::3] valid=15s;

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (internal Fly.io network)
    location /api/ {
        set $backend_upstream BACKEND_UPSTREAM_PLACEHOLDER;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
    }

    # Proxy /health to backend (uses public URL to wake up suspended machine)
    location /health {
        set $health_upstream HEALTH_UPSTREAM_PLACEHOLDER;
        proxy_pass $health_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
