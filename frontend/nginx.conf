server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend.
    # NOTE: proxy_pass must be LITERAL (not via $variable) so nginx correctly
    # strips the location prefix and rewrites the URI to the upstream.
    # The placeholder is replaced at container startup by the Dockerfile CMD.
    location /api/ {
        proxy_pass BACKEND_UPSTREAM_PLACEHOLDER;
        proxy_set_header Host docchat-backend.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
        proxy_ssl_server_name on;
    }

    # Proxy /health to backend (wakes up suspended machine)
    location /health {
        proxy_pass HEALTH_UPSTREAM_PLACEHOLDER;
        proxy_set_header Host docchat-backend.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
