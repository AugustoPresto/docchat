server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    # DNS resolver for Fly.io internal network (IPv4 + IPv6)
    resolver 127.0.0.11 [fdaa::3] valid=30s ipv6=off;

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (internal network, extended timeout for PDF processing)
    location /api/ {
        set $backend_upstream BACKEND_UPSTREAM_PLACEHOLDER;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        # Required for large uploads
        proxy_request_buffering off;
    }

    # Proxy health requests to backend (public network, triggers wake-up)
    location /health {
        set $health_upstream HEALTH_UPSTREAM_PLACEHOLDER;
        proxy_pass $health_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
